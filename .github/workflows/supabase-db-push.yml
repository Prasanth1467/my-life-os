# Pushes SQL migrations to your Supabase project when migration files change on main.
# Add repository secrets: SUPABASE_ACCESS_TOKEN (dashboard account tokens) and
# SUPABASE_PROJECT_REF (Project Settings → General → Reference ID).

name: Supabase DB push

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link and push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -e
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] || [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "Skipping db push: set SUPABASE_ACCESS_TOKEN and SUPABASE_PROJECT_REF repository secrets."
            exit 0
          fi
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase db push
